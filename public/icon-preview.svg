<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="fireGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c0392b"/>
      <stop offset="100%" style="stop-color:#f0a500"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0505"/>
      <stop offset="100%" style="stop-color:#0a0202"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Shield -->
  <path d="M50,3 L92,3 Q97,3 97,8 L97,58 Q97,82 50,97 Q3,82 3,58 L3,8 Q3,3 8,3 Z"
        fill="url(#shieldGrad)" stroke="#c0392b" stroke-width="2"/>

  <!-- Inner shield rim -->
  <path d="M50,10 L86,10 Q90,10 90,14 L90,57 Q90,76 50,89 Q10,76 10,57 L10,14 Q10,10 14,10 Z"
        fill="none" stroke="rgba(240,165,0,0.2)" stroke-width="1"/>

  <!-- Scale lines -->
  <path d="M18,38 Q34,32 50,38 Q66,32 82,38" fill="none" stroke="rgba(192,57,43,0.35)" stroke-width="1"/>
  <path d="M14,52 Q32,45 50,52 Q68,45 86,52" fill="none" stroke="rgba(192,57,43,0.35)" stroke-width="1"/>

  <!-- D letterform -->
  <text x="50" y="74" text-anchor="middle"
        font-family="Georgia, serif" font-size="60" font-weight="900"
        fill="url(#fireGrad)" filter="url(#glow)">D</text>

  <!-- Flame tips -->
  <path d="M33,3 Q37,-5 40,3" fill="#f0a500" opacity="0.8"/>
  <path d="M48,3 Q52,-7 56,3" fill="#f0a500" opacity="1"/>
  <path d="M63,3 Q67,-4 70,3" fill="#c0392b" opacity="0.7"/>
</svg>
