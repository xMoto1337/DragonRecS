<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 130" width="480" height="130">
  <defs>
    <linearGradient id="fire" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b1a0e"/>
      <stop offset="50%" stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#f0a500"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0a500"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ICON: Claw marks -->
  <g transform="translate(8, 10)">
    <!-- Three dragon claw slashes -->
    <path d="M18,8 Q28,30 22,55 Q20,65 25,78" stroke="url(#fire)" stroke-width="7" stroke-linecap="round" fill="none" filter="url(#glow)"/>
    <path d="M35,4 Q44,28 38,56 Q36,68 41,82" stroke="url(#fire)" stroke-width="7" stroke-linecap="round" fill="none" filter="url(#glow)"/>
    <path d="M52,8 Q60,30 54,55 Q52,66 57,78" stroke="url(#fire)" stroke-width="7" stroke-linecap="round" fill="none" filter="url(#glow)"/>
    <!-- Glow underlayer -->
    <path d="M18,8 Q28,30 22,55 Q20,65 25,78" stroke="rgba(192,57,43,0.25)" stroke-width="14" stroke-linecap="round" fill="none"/>
    <path d="M35,4 Q44,28 38,56 Q36,68 41,82" stroke="rgba(240,165,0,0.2)" stroke-width="14" stroke-linecap="round" fill="none"/>
    <path d="M52,8 Q60,30 54,55 Q52,66 57,78" stroke="rgba(192,57,43,0.25)" stroke-width="14" stroke-linecap="round" fill="none"/>
    <!-- Horizontal slash connecting them -->
    <path d="M12,48 L65,36" stroke="url(#gold)" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7"/>
  </g>

  <!-- Text -->
  <g transform="translate(95, 18)">
    <text x="0" y="48" font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="900" letter-spacing="1" fill="#f0f0f0">DRAGON</text>
    <!-- Gradient line -->
    <rect x="0" y="56" width="330" height="3" rx="1.5" fill="url(#fire)"/>
    <text x="2" y="80" font-family="Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="10" fill="#f0a500">RECREATION</text>
    <text x="2" y="100" font-family="Arial, sans-serif" font-size="11" font-weight="400" letter-spacing="12" fill="#666">SERVICES</text>
  </g>
</svg>
