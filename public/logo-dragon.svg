<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 220" width="360" height="220">
  <defs>
    <linearGradient id="scaleLight" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#f07535"/>
      <stop offset="60%" stop-color="#d44018"/>
      <stop offset="100%" stop-color="#9a2008"/>
    </linearGradient>
    <linearGradient id="scaleMid" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e86020"/>
      <stop offset="100%" stop-color="#b83010"/>
    </linearGradient>
    <linearGradient id="scaleDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c04010"/>
      <stop offset="100%" stop-color="#8a1a08"/>
    </linearGradient>
    <!-- Clip to arch canopy ring -->
    <clipPath id="archRing">
      <path d="M 18,118 C 18,80 30,48 58,28 Q 100,8 142,28 C 170,48 182,80 182,118
               L 158,118 C 158,84 148,56 128,40 Q 100,24 72,40 C 52,56 42,84 42,118 Z"/>
    </clipPath>
    <!-- Clip scales to just the top canopy zone -->
    <clipPath id="canopyOnly">
      <path d="M 18,82 C 18,60 30,38 58,24 Q 100,6 142,24 C 170,38 182,60 182,82
               L 158,82 C 158,64 148,48 128,38 Q 100,22 72,38 C 52,48 42,64 42,82 Z"/>
    </clipPath>
  </defs>

  <!-- Dark background for preview -->
  <rect width="360" height="220" fill="#080505" rx="12"/>

  <!-- ═══ ARCH ICON ═══ -->
  <g transform="translate(80, 6)">

    <!-- Arch frame (dark fill) -->
    <path d="M 18,118 C 18,80 30,48 58,28 Q 100,8 142,28 C 170,48 182,80 182,118
             L 158,118 C 158,84 148,56 128,40 Q 100,24 72,40 C 52,56 42,84 42,118 Z"
          fill="#151010" stroke="#2a1010" stroke-width="1.5"/>

    <!-- Scale rows — bottom to top so upper rows overlap lower ones -->
    <!-- Row 6 (bottom edge of canopy) -->
    <g clip-path="url(#canopyOnly)">
      <circle cx="33" cy="88" r="15" fill="#8a1a08" stroke="#5a0e04" stroke-width="1.2"/>
      <circle cx="48" cy="88" r="15" fill="#a02010" stroke="#5a0e04" stroke-width="1.2"/>
      <circle cx="63" cy="88" r="15" fill="#b83010" stroke="#5a0e04" stroke-width="1.2"/>
      <circle cx="78" cy="88" r="15" fill="#c84018" stroke="#5a0e04" stroke-width="1.2"/>
      <circle cx="93" cy="88" r="15" fill="#d85020" stroke="#5a0e04" stroke-width="1.2"/>
      <circle cx="108" cy="88" r="15" fill="#d85020" stroke="#5a0e04" stroke-width="1.2"/>
      <circle cx="123" cy="88" r="15" fill="#c84018" stroke="#5a0e04" stroke-width="1.2"/>
      <circle cx="138" cy="88" r="15" fill="#b83010" stroke="#5a0e04" stroke-width="1.2"/>
      <circle cx="153" cy="88" r="15" fill="#a02010" stroke="#5a0e04" stroke-width="1.2"/>
      <circle cx="168" cy="88" r="15" fill="#8a1a08" stroke="#5a0e04" stroke-width="1.2"/>

      <!-- Row 5 (offset) -->
      <circle cx="26" cy="74" r="15" fill="#9a2010" stroke="#5a0e04" stroke-width="1.2"/>
      <circle cx="41" cy="74" r="15" fill="#b03018" stroke="#5a0e04" stroke-width="1.2"/>
      <circle cx="56" cy="74" r="15" fill="#c54020" stroke="#5a0e04" stroke-width="1.2"/>
      <circle cx="71" cy="74" r="15" fill="#d85028" stroke="#5a0e04" stroke-width="1.2"/>
      <circle cx="86" cy="74" r="15" fill="#e86030" stroke="#5a0e04" stroke-width="1.2"/>
      <circle cx="101" cy="74" r="15" fill="#f07038" stroke="#5a0e04" stroke-width="1.2"/>
      <circle cx="116" cy="74" r="15" fill="#e86030" stroke="#5a0e04" stroke-width="1.2"/>
      <circle cx="131" cy="74" r="15" fill="#d85028" stroke="#5a0e04" stroke-width="1.2"/>
      <circle cx="146" cy="74" r="15" fill="#c54020" stroke="#5a0e04" stroke-width="1.2"/>
      <circle cx="161" cy="74" r="15" fill="#b03018" stroke="#5a0e04" stroke-width="1.2"/>
      <circle cx="176" cy="74" r="15" fill="#9a2010" stroke="#5a0e04" stroke-width="1.2"/>

      <!-- Row 4 -->
      <circle cx="33" cy="60" r="15" fill="#a82810" stroke="#5a0e04" stroke-width="1.2"/>
      <circle cx="48" cy="60" r="15" fill="#c03818" stroke="#5a0e04" stroke-width="1.2"/>
      <circle cx="63" cy="60" r="15" fill="#d44820" stroke="#5a0e04" stroke-width="1.2"/>
      <circle cx="78" cy="60" r="15" fill="#e85828" stroke="#5a0e04" stroke-width="1.2"/>
      <circle cx="93" cy="60" r="15" fill="#f06832" stroke="#5a0e04" stroke-width="1.2"/>
      <circle cx="108" cy="60" r="15" fill="#f06832" stroke="#5a0e04" stroke-width="1.2"/>
      <circle cx="123" cy="60" r="15" fill="#e85828" stroke="#5a0e04" stroke-width="1.2"/>
      <circle cx="138" cy="60" r="15" fill="#d44820" stroke="#5a0e04" stroke-width="1.2"/>
      <circle cx="153" cy="60" r="15" fill="#c03818" stroke="#5a0e04" stroke-width="1.2"/>
      <circle cx="168" cy="60" r="15" fill="#a82810" stroke="#5a0e04" stroke-width="1.2"/>

      <!-- Row 3 (offset) -->
      <circle cx="41" cy="46" r="15" fill="#b83018" stroke="#5a0e04" stroke-width="1.2"/>
      <circle cx="56" cy="46" r="15" fill="#cc4020" stroke="#5a0e04" stroke-width="1.2"/>
      <circle cx="71" cy="46" r="15" fill="#df5028" stroke="#5a0e04" stroke-width="1.2"/>
      <circle cx="86" cy="46" r="15" fill="#ef6032" stroke="#5a0e04" stroke-width="1.2"/>
      <circle cx="101" cy="46" r="15" fill="#f8703a" stroke="#5a0e04" stroke-width="1.2"/>
      <circle cx="116" cy="46" r="15" fill="#ef6032" stroke="#5a0e04" stroke-width="1.2"/>
      <circle cx="131" cy="46" r="15" fill="#df5028" stroke="#5a0e04" stroke-width="1.2"/>
      <circle cx="146" cy="46" r="15" fill="#cc4020" stroke="#5a0e04" stroke-width="1.2"/>
      <circle cx="161" cy="46" r="15" fill="#b83018" stroke="#5a0e04" stroke-width="1.2"/>

      <!-- Row 2 -->
      <circle cx="56" cy="32" r="15" fill="#d04020" stroke="#5a0e04" stroke-width="1.2"/>
      <circle cx="71" cy="32" r="15" fill="#e05028" stroke="#5a0e04" stroke-width="1.2"/>
      <circle cx="86" cy="32" r="15" fill="#f06030" stroke="#5a0e04" stroke-width="1.2"/>
      <circle cx="101" cy="32" r="15" fill="#fa7038" stroke="#5a0e04" stroke-width="1.2"/>
      <circle cx="116" cy="32" r="15" fill="#f06030" stroke="#5a0e04" stroke-width="1.2"/>
      <circle cx="131" cy="32" r="15" fill="#e05028" stroke="#5a0e04" stroke-width="1.2"/>
      <circle cx="146" cy="32" r="15" fill="#d04020" stroke="#5a0e04" stroke-width="1.2"/>

      <!-- Row 1 (top) -->
      <circle cx="78" cy="18" r="15" fill="#e05028" stroke="#5a0e04" stroke-width="1.2"/>
      <circle cx="100" cy="16" r="15" fill="#f86835" stroke="#5a0e04" stroke-width="1.2"/>
      <circle cx="122" cy="18" r="15" fill="#e05028" stroke="#5a0e04" stroke-width="1.2"/>
    </g>

    <!-- Re-draw arch frame outline on top of scales -->
    <!-- Left leg -->
    <path d="M 18,118 C 18,80 30,48 58,28 Q 100,8 142,28 C 170,48 182,80 182,118"
          fill="none" stroke="#0f0808" stroke-width="7" stroke-linecap="round"/>
    <!-- Inner arch -->
    <path d="M 42,118 C 42,84 52,56 72,40 Q 100,24 128,40 C 148,56 158,84 158,118"
          fill="none" stroke="#0f0808" stroke-width="5" stroke-linecap="round"/>

    <!-- Pillar feet (small rectangular bases) -->
    <rect x="12" y="114" width="18" height="8" rx="2" fill="#1a1010"/>
    <rect x="170" y="114" width="18" height="8" rx="2" fill="#1a1010"/>
  </g>

  <!-- ═══ TEXT ═══ -->
  <text x="180" y="158" text-anchor="middle"
        font-family="'Arial Black', Arial, sans-serif"
        font-size="44" font-weight="900" letter-spacing="3"
        fill="#f0f0f0">DRAGON</text>
  <text x="180" y="180" text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="13" font-weight="700" letter-spacing="7"
        fill="#f0a500">RECREATION</text>
  <text x="180" y="200" text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="11" font-weight="500" letter-spacing="8"
        fill="#888888">SERVICES</text>
</svg>
