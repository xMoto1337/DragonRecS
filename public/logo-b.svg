<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 130" width="480" height="130">
  <defs>
    <linearGradient id="fireB" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#f0a500"/>
    </linearGradient>
    <linearGradient id="shieldB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e0a0a"/>
      <stop offset="100%" stop-color="#0a0202"/>
    </linearGradient>
    <filter id="glowB">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ICON: Hexagon crest -->
  <g transform="translate(6, 8)">
    <!-- Hexagon shape -->
    <polygon points="52,4 90,26 90,70 52,92 14,70 14,26"
             fill="#0f0404" stroke="url(#fireB)" stroke-width="2.5"/>
    <!-- Inner hexagon outline -->
    <polygon points="52,13 81,30 81,66 52,83 23,66 23,30"
             fill="none" stroke="rgba(240,165,0,0.15)" stroke-width="1"/>

    <!-- Flame shape inside -->
    <path d="M52,22 C52,22 64,34 64,46 C64,53 60,58 52,62 C44,58 40,53 40,46 C40,34 52,22 52,22 Z"
          fill="url(#fireB)" filter="url(#glowB)" opacity="0.9"/>
    <!-- Inner flame -->
    <path d="M52,32 C52,32 59,40 59,48 C59,53 56,56 52,58 C48,56 45,53 45,48 C45,40 52,32 52,32 Z"
          fill="#f0a500" opacity="0.6"/>

    <!-- Corner accent dots -->
    <circle cx="52" cy="4" r="3" fill="#f0a500" opacity="0.8"/>
    <circle cx="90" cy="26" r="2" fill="#c0392b" opacity="0.6"/>
    <circle cx="90" cy="70" r="2" fill="#c0392b" opacity="0.6"/>
    <circle cx="52" cy="92" r="3" fill="#f0a500" opacity="0.8"/>
    <circle cx="14" cy="70" r="2" fill="#c0392b" opacity="0.6"/>
    <circle cx="14" cy="26" r="2" fill="#c0392b" opacity="0.6"/>
  </g>

  <!-- Text -->
  <g transform="translate(114, 18)">
    <text x="0" y="48" font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="900" letter-spacing="1" fill="#f0f0f0">DRAGON</text>
    <rect x="0" y="56" width="330" height="3" rx="1.5" fill="url(#fireB)"/>
    <text x="2" y="80" font-family="Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="10" fill="#f0a500">RECREATION</text>
    <text x="2" y="100" font-family="Arial, sans-serif" font-size="11" font-weight="400" letter-spacing="12" fill="#666">SERVICES</text>
  </g>
</svg>
